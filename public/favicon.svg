<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="secondary" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)" />
  <rect width="512" height="512" rx="128" fill="none" stroke="url(#primary)" stroke-width="4" stroke-opacity="0.3"/>

  <!-- RM Monogram -->
  <g transform="translate(100, 126)" filter="url(#glow)">
    <!-- 'R' mark -->
    <path d="M 50 260 L 50 40 L 150 40 C 190 40 220 70 220 110 C 220 150 190 180 150 180 L 110 180 L 170 260" 
          fill="none" stroke="url(#primary)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- 'M' mark -->
    <path d="M 170 260 L 170 100 L 230 160 L 290 100 L 290 260" 
          fill="none" stroke="url(#secondary)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>